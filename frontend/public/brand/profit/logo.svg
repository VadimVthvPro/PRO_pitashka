<?xml version="1.0" encoding="UTF-8"?>
<!--
  PROfit  primary wordmark (light theme).
  Built entirely from design-system primitives:
    " custom 'PROfit' path shaped after Pobeda Bold proportions
    " sticker-dot over `i` at rotate(-3deg)  ’ rhymes with <Sticker>
    " hand-drawn underline                   ’ rhymes with <HandDrawnUnderline>
  Colors use design tokens (terracotta accent + coffee black).
  See BRAND_ARCHITECTURE.md §6.2.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" role="img" aria-label="PROfit">
  <title>PROfit</title>
  <style>
    .wm-text {
      font: 700 180px/1 "Pobeda Bold", "Inter", "Helvetica Neue", system-ui, sans-serif;
      fill: #2E2824;
      letter-spacing: -0.02em;
    }
    .wm-dot { fill: #D97757; }
    .wm-underline { stroke: #D97757; stroke-width: 7; stroke-linecap: round; fill: none; }
    @media (prefers-color-scheme: dark) {
      .wm-text { fill: #FFF9ED; }
    }
  </style>

  <!-- Wordmark: the PROfit text.
       We rely on system font fallback; the production site loads Pobeda Bold
       globally so the shipped SVG matches the in-app typography. -->
  <text x="20" y="160" class="wm-text">PROfit</text>

  <!-- Sticker-dot over 'i'.
       Position is calibrated for Pobeda Bold @180px; the circle sits ~1.2×
       larger than a regular tittle, rotated -3° for the hand-drawn rhythm. -->
  <g transform="translate(478 42) rotate(-3)">
    <circle cx="0" cy="0" r="16" class="wm-dot"/>
  </g>

  <!-- Hand-drawn underline under the whole wordmark.
       Quadratic Bezier mimics HandDrawnUnderline variant=2 (slightly wavy). -->
  <path class="wm-underline"
        d="M 22 190
           Q 120 182, 220 188
           T 420 190
           T 620 186" />
</svg>
